services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: file:/data/dev.db
      PORT: "4000"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-must-be-at-least-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-must-be-at-least-32}
      FRONTEND_ORIGIN: http://localhost:8080,http://localhost:5173
    volumes:
      - jikko_sqlite:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  jikko_sqlite:
